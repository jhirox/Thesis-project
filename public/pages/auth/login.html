<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
        integrity="sha512-dPXYcDub/aeb08c63jRq/k6GaKccl256JQy/AnOq7CAnEZ9FzSL9wSbcZkMp4R26vBsMLFYH4kQ67/bbV8XaCQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="/public/css/style.css">

</head>
<body class="page-credentials">
    <div class="wrapper">
        <div class="page-credentials bg-image">
            <div class="container d-flex justify-content-center align-items-center vh-100">
                <div class="page-credentials card text-white px-5 pt-4 pb-4">
                    <img class="page-credentials logo d-flex justify-content-center align-items-center" src="/public/assets/images/logo.png" alt="logo">
                    <h4 class="text-center mb-4 fw-bold fs-3">Log in</h4>
                    <form action="#" method="get" id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="Email" class="form-control" id="email" placeholder="Enter email">
                                <!-- <span id="email-error" class="error-message"></span> -->
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="Password" class="form-control" id="password" placeholder="Password">
                                <!-- <span id="password-error" class="error-message"></span> -->
                            </div>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                        <div class="card-footer text-center pt-3">
                            Login as an <a href="./adminlogin.html">Admin</a> <br>
                            Don't have an account? <a href="./signup.html">Create</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

        <script type="module">
        import { user_data } from "/data/users.js";
        import { validateFields, validate } from "/public/js/utils/validators.js";
        import { loginPatterns } from "/public/js/utils/patterns.js";

        const authUser = JSON.parse(localStorage.getItem('sessionUser'));
        const curTimeout = localStorage.getItem('sessionTimeout');

        if(authUser && authUser != null && curTimeout && Date.now() < Number(curTimeout)){
            window.location.href = "/public/pages/user/profile.html";
        }

        const timeout = 30 * 60 * 1000;

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector("#login-form");
            const rememberCbx = document.querySelector("#remember");

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const email = document.querySelector("#email");
                const password = document.querySelector("#password");

                const errors = validate(form, loginPatterns)
                console.log(errors);

                if (errors && errors.length > 0) {
                    const errorMessage = errors.join('<br>');
                    console.log(errorMessage);
                    showError(errorMessage);
                } else {
                    let isAuthenticated = false;
                    let authUser = null;
                    user_data.forEach(user => {
                        if (user.username === email.value && user.password === password.value) {
                            isAuthenticated = true;
                            authUser = user;
                            return;
                        }
                    });

                    if (isAuthenticated) {
                        Swal.fire({
                            title: "User Management System",
                            text: "Logged in successfully!",
                            icon: "success"
                        });

                        const sessionUser = {
                            user: authUser,
                            loginTime: new Date().toISOString(),
                            IsRemember: rememberCbx.checked
                        }

                        if (authUser && authUser != null) {
                            const sessionUserJSON = JSON.stringify(sessionUser);
                            localStorage.setItem("sessionUser", sessionUserJSON);
                            localStorage.setItem("sessionTimeout", Date.now() + timeout);

                            setTimeout(() => {
                                window.location.href = "/public/pages/user/profile.html";
                            }, 2000);
                        } else {
                            showError('Error storing session data.');
                        }
                    } else {
                        showError("Invalid email or password. Please try again.");
                    }
                }
            });

            const showError = (message) => {
                Swal.fire({
                    icon: "error",
                    title: "User Management System",
                    html: message,
                });
            };

        });
    </script>

    <!-- <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script> -->
</body>
</html>
